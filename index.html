<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <meta name="description" content="">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&family=Zen+Kaku+Gothic+Antique&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=menu" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="header-logo">KYOKO MOMOSE</div>
        <div class="header-menu">
            <span class="material-symbols-outlined">menu</span>
        </div>
    </header>

    <!--
    <nav>

    </nav>-->

    <!--<h1 style="text-align: center;">KYOKO MOMOSE</h1>-->

    <main>
        <div class="mov_area fade-in">
            <div class="mov_item">
                <div class="mov_text">
                    <div class="hajimemashite fade-in delay-1">はじめまして。</div>
                </div>
            </div>
            <div class="sunawa_mov mov_item">
                <video src="images/sunawa.mov" autoplay muted loop playsinline
                    style="width: 100%; transform: translate(0%, -12%); opacity: 0.8"></video>
            </div>
        </div>

        <div class="vertical-line-container">
            <div class="vertical-line line-grow"></div>
        </div>

        <section class="catch-copy-section">
            <p class="catch-text">ようこそ、私のポートフォリオへ。</p>
        </section>

        <div class="vertical-line-container">
            <div class="vertical-line line-grow"></div>
        </div>

        <section id="resume" class="resume-section fade-in">
            <div class="resume-container fade-in">
                <div class="resume-left">
                    <p class="section-title fade-in delay-1">経歴をご紹介いたします。</p>
                </div>

                <div class="resume-right">
                    <div class="resume-photo fade-in delay-2">
                        <img src="images/kyoko.jpg" alt="Kyoko Momose">
                    </div>
                    <div class="resume-details">
                        <p class="profile-text fade-in delay-3">
                            百瀬響子 ・ ももせきょうこ<br>
                        </p>
                        <ul class="history-list fade-in delay-4">
                            <li><span>2001</span>慶應義塾大学 環境情報学部卒業</li>
                            <li><span>2001</span>任天堂株式会社 入社</li>
                            <li><span>2010</span>フリーライターとして独立</li>
                            <li><span>2022</span>株式会社OGA 入社</li>
                            <li><span>2026</span>株式会社Whatever 業務提携</li>
                        </ul>
                    </div>
                </div>
            </div>
        </section>

        <div class="vertical-line-container">
            <div class="vertical-line line-grow"></div>
        </div>



    </main>

    <script src="script.js"></script>

</body>

</html>
